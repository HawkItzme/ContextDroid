[graph]
all-features = true

[advisories]
unmaintained = "workspace"
yanked = "deny"
ignore = []

[licenses]
confidence-threshold = 0.8
allow = [
  "0BSD",
  "Apache-2.0",
  "BSD-2-Clause",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
