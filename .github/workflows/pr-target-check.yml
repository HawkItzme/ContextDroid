name: PR target branch check

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  wrong-target:
    if: >-
      github.event.pull_request.base.ref != 'develop' &&
      !(github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'develop') &&
      !(github.event.pull_request.base.ref == 'product/contextdroid-v0.1' &&
        github.event.pull_request.head.ref == 'fix/contextdroid-v0.1-release-readiness')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = `ContextDroid contributions target \`develop\`. Only the reviewed \`develop\` branch is promoted to \`main\` for a release. See [CONTRIBUTING.md](https://github.com/HawkItzme/ContextDroid/blob/main/CONTRIBUTING.md).`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body
            });
