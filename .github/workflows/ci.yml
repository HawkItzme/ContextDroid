name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [product/contextdroid-v0.1, develop, main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  COMPARISON_BASE: ${{ github.event.pull_request.base.sha || github.event.before || '' }}

jobs:
  check-test-presence:
    name: test presence
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Check filter modules have tests
        run: |
          set -euo pipefail
          base="$COMPARISON_BASE"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}"; then
            base=$(git rev-parse HEAD^)
          fi
          bash scripts/check-test-presence.sh "$base"

  identity-contract:
    name: docs and product identity
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: bash scripts/validate-docs.sh

  fmt:
    name: fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@42520bdb3cb59f71dae6f8557f7056cf3a46c898 # 1.91.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    needs: fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@42520bdb3cb59f71dae6f8557f7056cf3a46c898 # 1.91.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    needs: clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@42520bdb3cb59f71dae6f8557f7056cf3a46c898 # 1.91.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo test --all --locked

  security:
    name: Security Scan
    needs: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@42520bdb3cb59f71dae6f8557f7056cf3a46c898 # 1.91.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Resolve comparison base
        run: |
          set -euo pipefail
          base="$COMPARISON_BASE"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}"; then
            base=$(git rev-parse HEAD^)
          fi
          echo "SECURITY_BASE=$base" >> "$GITHUB_ENV"
      - name: Install pinned security tools
        run: |
          cargo install --locked cargo-audit --version 0.22.2
          cargo install --locked cargo-deny --version 0.20.2
      - name: Cargo audit
        run: cargo audit --deny warnings
      - name: License, ban, and source policy
        run: cargo deny check advisories bans licenses sources
      - name: Critical files check
        run: |
          set -euo pipefail
          CRITICAL=$(git diff --name-only "$SECURITY_BASE"...HEAD | grep -E '(runner|stream|run_store|secure_fs|integrations|migration)\.rs|Cargo\.(toml|lock)|install\.(sh|ps1)|release/|workflows/.*\.yml' || true)
          if [[ -n "$CRITICAL" ]]; then
            echo "::warning::Critical ContextDroid files modified; maintainer security review is required"
            printf '%s\n' "$CRITICAL"
          fi
      - name: Dangerous patterns scan
        run: |
          set -euo pipefail
          PATTERNS=$(git diff -U0 "$SECURITY_BASE"...HEAD -- '*.rs' | grep '^+' | grep -E 'Command::new\("sh"|Command::new\("bash"|\.env\("LD_PRELOAD|\.env\("PATH|reqwest::|std::net::|TcpStream|UdpSocket|unsafe \{|todo!\(|unimplemented!\(' || true)
          if [[ -n "$PATTERNS" ]]; then
            printf '%s\n' "$PATTERNS" | head -30
            echo "::error::Dangerous code patterns require security review and an approved narrow policy exception"
            exit 1
          fi
      - name: New dependencies report
        run: |
          set -euo pipefail
          git diff "$SECURITY_BASE"...HEAD Cargo.toml | grep -E '^\+.*=' | grep -v '^\+\+\+' || true

  semgrep:
    name: semgrep security scan
    needs: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Resolve comparison base
        run: |
          set -euo pipefail
          base="$COMPARISON_BASE"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}"; then
            base=$(git rev-parse HEAD^)
          fi
          echo "SEMGREP_BASE=$base" >> "$GITHUB_ENV"
      - name: Install the pinned Semgrep runtime
        run: |
          pipx install semgrep==1.125.0
          # Semgrep 1.125 imports pkg_resources; fresh pipx environments no
          # longer bundle it, so pin the last compatible setuptools release.
          pipx inject --force semgrep setuptools==80.9.0
      - run: semgrep scan --config .semgrep.yml --baseline-commit "$SEMGREP_BASE" --error

  release-build:
    name: release build (${{ matrix.os }})
    needs: clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@42520bdb3cb59f71dae6f8557f7056cf3a46c898 # 1.91.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo build --release --locked

  docs-contract:
    name: docs and help contract
    needs: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@42520bdb3cb59f71dae6f8557f7056cf3a46c898 # 1.91.0
      - run: bash scripts/validate-docs.sh
      - run: cargo run --quiet --locked -- --help > help.txt
      - run: grep -q 'Android Logcat' help.txt && grep -q 'canonical local analytics' help.txt

  android-smoke:
    name: Android Gradle smoke
    needs: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          gradle-version: 9.5.0
      - uses: dtolnay/rust-toolchain@42520bdb3cb59f71dae6f8557f7056cf3a46c898 # 1.91.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'
      - run: cargo build --release --locked
      - run: bash scripts/smoke-android-linux.sh

  public-android-validation:
    name: Public Android project validation
    needs: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - uses: dtolnay/rust-toolchain@42520bdb3cb59f71dae6f8557f7056cf3a46c898 # 1.91.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'
      - run: cargo build --release --locked
      - name: Checkout pinned Apache-2.0 Android sample
        run: |
          git clone --filter=blob:none https://github.com/android/architecture-samples.git "$RUNNER_TEMP/architecture-samples"
          git -C "$RUNNER_TEMP/architecture-samples" checkout ee66e1526b84c026615df032c705842b7d2a521f
      - name: Run raw and ContextDroid validation
        run: bash scripts/validate-architecture-samples-linux.sh "$RUNNER_TEMP/architecture-samples" "$PWD/target/release/contextdroid" "$RUNNER_TEMP/contextdroid-validation"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: public-android-validation
          path: ${{ runner.temp }}/contextdroid-validation
          if-no-files-found: error

  claude-linux-smoke:
    name: Claude integration and compact git status smoke
    needs: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@42520bdb3cb59f71dae6f8557f7056cf3a46c898 # 1.91.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo build --release --locked
      - run: bash scripts/smoke-claude-linux.sh
