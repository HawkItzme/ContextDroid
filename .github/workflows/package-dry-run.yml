name: Package dry run

on:
  pull_request:
    branches: [product/contextdroid-v0.1, develop, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    uses: ./.github/workflows/release.yml
    with:
      tag: v0.1.0-alpha.1
      publish: false
      prerelease: true
    permissions:
      # Reusable workflows cannot elevate permissions above their caller. The
      # publish job is conditionally skipped here, but its declared permissions
      # still have to be admitted while GitHub constructs the job graph.
      contents: write
      id-token: write
      attestations: write
