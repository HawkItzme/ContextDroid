## Anti-Patterns to Avoid\r
\r
❌ **DON'T** add async (kills startup time, RTK is single-threaded)\r
- No tokio, async-std, or any async runtime\r
- Adding async adds ~5-10ms startup overhead\r
- RTK targets <10ms total startup\r
\r
❌ **DON'T** recompile regex at runtime → Use `lazy_static!`\r
- Regex compilation is expensive (~1-5ms per pattern)\r
- Use `lazy_static! { static ref RE: Regex = ... }` for all patterns\r
\r
❌ **DON'T** panic on filter failure → Fallback to raw command\r
- User workflow must never break\r
- If filter fails, execute original command unchanged\r
\r
❌ **DON'T** assume command output format → Test with fixtures\r
- Command output changes across versions\r
- Use flexible regex patterns, test with real fixtures\r
\r
❌ **DON'T** skip cross-platform testing → macOS ≠ Linux ≠ Windows\r
- Shell escaping differs: bash/zsh vs PowerShell\r
- Test on macOS + Linux (Docker) minimum\r
\r
❌ **DON'T** break pipe compatibility → `rtk git status | grep modified` must work\r
- Preserve stdout/stderr separation\r
- Respect exit codes (0 = success, non-zero = failure)\r
\r
✅ **DO** provide fallback to raw command on filter failure\r
✅ **DO** compile regex once with `lazy_static!`\r
✅ **DO** verify token savings claims in tests (≥60%)\r
✅ **DO** test on macOS + Linux + Windows (via CI or manual)\r
✅ **DO** run `cargo fmt && cargo clippy --all-targets && cargo test` before commit\r
✅ **DO** benchmark startup time with `hyperfine` (<10ms target)\r
✅ **DO** use `anyhow::Result` with `.context()` for all error propagation\r
\r
## Filter Development Workflow\r
\r
When adding a new filter (e.g., `rtk newcmd`):\r
\r
### 1. Create Module\r
\r
```bash\r
touch src/cmds/<ecosystem>/newcmd_cmd.rs\r
```\r
\r
```rust\r
// src/cmds/<ecosystem>/newcmd_cmd.rs\r
use anyhow::{Context, Result};\r
use lazy_static::lazy_static;\r
use regex::Regex;\r
\r
lazy_static! {\r
    static ref PATTERN: Regex = Regex::new(r"pattern").unwrap();\r
}\r
\r
pub fn filter_newcmd(input: &str) -> Result<String> {\r
    // Implement filtering logic\r
    // Use PATTERN regex (compiled once)\r
    // Add fallback logic on error\r
    Ok(condensed_output)\r
}\r
\r
#[cfg(test)]\r
mod tests {\r
    use super::*;\r
\r
    #[test]\r
    fn test_token_savings() {\r
        let input = include_str!("../tests/fixtures/newcmd_raw.txt");\r
        let output = filter_newcmd(input).unwrap();\r
\r
        let savings = calculate_savings(input, &output);\r
        assert!(savings >= 60.0, "Expected ≥60% savings, got {:.1}%", savings);\r
    }\r
}\r
```\r
\r
### 2. Register Module\r
\r
Add to ecosystem `mod.rs` (e.g., `src/cmds/system/mod.rs`):\r
```rust\r
pub mod newcmd_cmd;\r
```\r
\r
Add to `src/main.rs` Commands enum and routing:\r
```rust\r
// Add use import\r
use cmds::system::newcmd_cmd;\r
\r
// In Commands enum\r
Newcmd {\r
    #[arg(trailing_var_arg = true, allow_hyphen_values = true)]\r
    args: Vec<String>,\r
},\r
\r
// In match statement\r
Commands::Newcmd { args } => {\r
    let output = execute_newcmd(&args)?;\r
    let filtered = filter_newcmd(&output).unwrap_or(output);\r
    print!("{}", filtered);\r
}\r
```\r
\r
### 3. Write Tests First (TDD)\r
\r
Create fixture:\r
```bash\r
echo "raw newcmd output" > tests/fixtures/newcmd_raw.txt\r
```\r
\r
Write test (see above), run `cargo test` → should fail (red).\r
\r
### 4. Implement Filter\r
\r
Implement `filter_newcmd()`, run `cargo test` → should pass (green).\r
\r
### 5. Quality Checks\r
\r
```bash\r
cargo fmt --all && cargo clippy --all-targets && cargo test --all\r
```\r
\r
### 6. Benchmark Performance\r
\r
```bash\r
hyperfine 'rtk newcmd args' --warmup 3\r
# Should be <10ms\r
```\r
\r
### 7. Manual Testing\r
\r
```bash\r
rtk newcmd args\r
# Inspect output:\r
# - Is it condensed?\r
# - Critical info preserved?\r
# - Readable format?\r
```\r
