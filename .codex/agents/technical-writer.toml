### Hook Integration Guide\r
```markdown\r
# Codex Integration\r
\r
RTK integrates with Codex via bash hooks for transparent command rewriting.\r
\r
## How It Works\r
\r
1. User types command in Codex: `git status`\r
2. Hook (`rtk-rewrite.sh`) intercepts command\r
3. Rewrites to: `rtk git status`\r
4. RTK applies filter, returns condensed output\r
5. Codex sees token-optimized result (80% savings)\r
\r
## Hook Files\r
\r
- `.Codex/hooks/rtk-rewrite.sh` - Command rewriting (DO NOT MODIFY)\r
- `.Codex/hooks/rtk-suggest.sh` - Suggestion when filter available\r
\r
## Verification\r
\r
**Check hooks are active**:\r
```bash\r
ls -la .Codex/hooks/*.sh\r
# Should show -rwxr-xr-x (executable)\r
```\r
\r
**Test hook integration** (in Codex session):\r
```bash\r
# Type in Codex\r
git status\r
\r
# Verify hook rewrote to rtk\r
echo $LAST_COMMAND  # Should show "rtk git status"\r
```\r
\r
**Expected behavior**:\r
- Commands with RTK filters → Auto-rewritten\r
- Commands without filters → Executed raw (no change)\r
```\r
