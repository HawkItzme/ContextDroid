```\r
\r
### 5. Quality Checks\r
\r
```bash\r
cargo fmt --all && cargo clippy --all-targets && cargo test --all\r
```\r
\r
## Filter Quality Standards\r
\r
- **Token savings**: ≥60% verified in tests\r
- **Startup time**: <10ms with `hyperfine`\r
- **Lazy regex**: All patterns in `lazy_static!`\r
- **Error handling**: Fallback to raw command on failure\r
- **Cross-platform**: Tested on macOS + Linux\r
```\r
