### Installation Documentation\r
```markdown\r
# Installing RTK\r
\r
## macOS\r
\r
**Option 1: Homebrew**\r
```bash\r
brew install rtk-ai/tap/rtk\r
rtk --version  # Should show rtk X.Y.Z\r
```\r
\r
**Option 2: From Source**\r
```bash\r
git clone https://github.com/rtk-ai/rtk.git\r
cd rtk\r
cargo install --path .\r
rtk --version  # Verify installation\r
```\r
\r
**Verification**:\r
```bash\r
rtk gain  # Should show token savings analytics\r
```\r
\r
## Linux\r
\r
**From Source** (Cargo required):\r
```bash\r
git clone https://github.com/rtk-ai/rtk.git\r
cd rtk\r
cargo install --path .\r
\r
# Verify installation\r
which rtk\r
rtk --version\r
```\r
\r
**Binary Download** (faster):\r
```bash\r
curl -sSL https://github.com/rtk-ai/rtk/releases/download/v0.16.0/rtk-linux-x86_64 -o rtk\r
chmod +x rtk\r
sudo mv rtk /usr/local/bin/\r
rtk --version\r
```\r
\r
## Windows\r
\r
**Binary Download**:\r
```powershell\r
# Download rtk-windows-x86_64.exe\r
# Add to PATH\r
# Verify\r
rtk --version\r
```\r
\r
## Troubleshooting\r
\r
**Issue: `rtk: command not found`**\r
- **Cause**: Binary not in PATH\r
- **Fix**: Add `~/.cargo/bin` to PATH\r
  ```bash\r
  echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> ~/.zshrc\r
  source ~/.zshrc\r
  ```\r
\r
**Issue: `rtk gain` fails**\r
- **Cause**: Wrong RTK installed (reachingforthejack/rtk name collision)\r
- **Fix**: Uninstall and reinstall correct RTK\r
  ```bash\r
  cargo uninstall rtk\r
  cargo install --path .  # From rtk-ai/rtk repo\r
  rtk gain --help  # Should work\r
  ```\r
```\r
