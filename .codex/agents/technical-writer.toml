### Filter Development Guide\r
```markdown\r
# Contributing a New Filter\r
\r
## Steps\r
\r
### 1. Create Filter Module\r
\r
```bash\r
touch src/cmds/<ecosystem>/newcmd_cmd.rs\r
```\r
\r
```rust\r
// src/cmds/<ecosystem>/newcmd_cmd.rs\r
use anyhow::{Context, Result};\r
use lazy_static::lazy_static;\r
use regex::Regex;\r
\r
lazy_static! {\r
    static ref PATTERN: Regex = Regex::new(r"pattern").unwrap();\r
}\r
\r
pub fn filter_newcmd(input: &str) -> Result<String> {\r
    // Filter logic\r
    Ok(condensed_output)\r
}\r
\r
#[cfg(test)]\r
mod tests {\r
    use super::*;\r
\r
    #[test]\r
    fn test_token_savings() {\r
        let input = include_str!("../tests/fixtures/newcmd_raw.txt");\r
        let output = filter_newcmd(input).unwrap();\r
\r
        let savings = calculate_savings(input, &output);\r
        assert!(savings >= 60.0);\r
    }\r
}\r
```\r
\r
### 2. Add to main.rs\r
\r
```rust\r
// src/main.rs\r
#[derive(Subcommand)]\r
enum Commands {\r
    Newcmd {\r
        #[arg(trailing_var_arg = true)]\r
        args: Vec<String>,\r
    },\r
}\r
```\r
\r
### 3. Write Tests\r
\r
```bash\r
# Create fixture\r
newcmd --args > tests/fixtures/newcmd_raw.txt\r
\r
# Run tests\r
cargo test\r
```\r
\r
### 4. Document Token Savings\r
\r
Update README.md:\r
```markdown\r
